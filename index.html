<!DOCTYPE html>

    <!--
      DARK MODE FOUC PREVENTION — v3.0
      Must run synchronously before any render. Reads localStorage and applies
      data-theme="dark" to <html> immediately, preventing the flash of light
      theme on dark-mode users' first page load.
      ADR-017: Inline theme script in <head>.
    -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('ns-theme')
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
          if (stored === 'dark' || (!stored && prefersDark)) {
            document.documentElement.setAttribute('data-theme', 'dark')
          }
        } catch (e) {}
      })()
    </script>
